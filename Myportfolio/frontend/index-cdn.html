<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PC Config App</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen">
    <div id="app"></div>

    <script>
      const API_BASE_URL = "http://localhost:8001";

      async function generateConfig(budget, usage) {
        const button = document.querySelector('button[type="submit"]');
        button.disabled = true;
        button.textContent = "Generating...";

        try {
          const response = await fetch(`${API_BASE_URL}/generate-config`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ budget, usage }),
          });

          if (!response.ok) {
            const error = await response.json();
            throw new Error(error.detail || "Failed to generate config");
          }

          const config = await response.json();
          showResult(config);
        } catch (error) {
          alert("Error: " + error.message);
          button.disabled = false;
          button.textContent = "Generate";
        }
      }

      function showForm() {
        document.getElementById("app").innerHTML = `
          <div class="flex items-center justify-center min-h-screen p-6">
            <div class="bg-white rounded-lg shadow-2xl p-8 max-w-md w-full">
              <h1 class="text-3xl font-bold text-gray-800 mb-2">PC Build Generator</h1>
              <p class="text-gray-600 mb-8">Enter your budget and usage to generate a compatible PC build.</p>

              <form id="configForm" class="space-y-6">
                <div>
                  <label class="block text-sm font-semibold text-gray-700 mb-2">Budget (JPY)</label>
                  <input
                    type="number"
                    id="budget"
                    value="150000"
                    min="50000"
                    max="500000"
                    step="10000"
                    class="w-full px-4 py-3 border-2 border-gray-300 rounded-lg focus:outline-none focus:border-indigo-500 font-bold text-lg"
                  />
                  <p id="budgetDisplay" class="text-gray-600 text-sm mt-1">JPY 150,000</p>
                </div>

                <div>
                  <label class="block text-sm font-semibold text-gray-700 mb-3">Usage</label>
                  <div class="space-y-2">
                    <label class="cursor-pointer p-3 border-2 border-indigo-600 bg-indigo-50 rounded-lg block">
                      <input type="radio" name="usage" value="gaming" checked class="mr-2" /> Gaming
                    </label>
                    <label class="cursor-pointer p-3 border-2 border-gray-200 hover:border-gray-300 rounded-lg block">
                      <input type="radio" name="usage" value="video_editing" class="mr-2" /> Video Editing
                    </label>
                    <label class="cursor-pointer p-3 border-2 border-gray-200 hover:border-gray-300 rounded-lg block">
                      <input type="radio" name="usage" value="general" class="mr-2" /> General
                    </label>
                  </div>
                </div>

                <button
                  type="submit"
                  class="w-full py-3 rounded-lg font-bold text-lg bg-indigo-600 text-white hover:bg-indigo-700 transition"
                >
                  Generate
                </button>
              </form>
            </div>
          </div>
        `;

        document.getElementById("budget").addEventListener("input", (e) => {
          document.getElementById("budgetDisplay").textContent =
            "JPY " + Number(e.target.value).toLocaleString("ja-JP");
        });

        document.getElementById("configForm").addEventListener("submit", (e) => {
          e.preventDefault();
          const budget = Number(document.getElementById("budget").value);
          const usage = document.querySelector('input[name="usage"]:checked').value;
          generateConfig(budget, usage);
        });
      }

      function showResult(config) {
        const usageLabel = {
          gaming: "Gaming",
          video_editing: "Video Editing",
          general: "General",
        }[config.usage] || config.usage;

        document.getElementById("app").innerHTML = `
          <div class="min-h-screen p-6">
            <div class="max-w-4xl mx-auto">
              <button onclick="showForm()" class="mb-6 px-4 py-2 bg-gray-600 text-white rounded-lg hover:bg-gray-700 transition">Back</button>

              <div class="bg-white rounded-lg shadow-lg p-8">
                <h2 class="text-2xl font-bold text-gray-800 mb-2">Build Generated</h2>
                <p class="text-gray-600 mb-6">Usage: <span class="font-semibold">${usageLabel}</span></p>

                <div class="bg-blue-50 border-2 border-blue-300 rounded-lg p-6 mb-8 grid grid-cols-1 md:grid-cols-3 gap-4">
                  <div>
                    <p class="text-gray-600">Budget</p>
                    <p class="text-xl font-bold text-gray-800">JPY ${config.budget.toLocaleString("ja-JP")}</p>
                  </div>
                  <div>
                    <p class="text-gray-600">Total</p>
                    <p class="text-xl font-bold text-green-600">JPY ${config.total_price.toLocaleString("ja-JP")}</p>
                  </div>
                  <div>
                    <p class="text-gray-600">Estimated Power</p>
                    <p class="text-xl font-bold text-gray-800">${config.estimated_power_w}W</p>
                  </div>
                </div>

                <div class="space-y-4">
                  ${config.parts.map((part) => `
                    <div class="border border-gray-200 rounded-lg p-4">
                      <div class="flex justify-between gap-4">
                        <div>
                          <p class="text-sm uppercase text-gray-500">${part.category}</p>
                          <p class="font-semibold text-gray-800">${part.name}</p>
                        </div>
                        <p class="font-bold text-indigo-600">JPY ${part.price.toLocaleString("ja-JP")}</p>
                      </div>
                    </div>
                  `).join("")}
                </div>
              </div>
            </div>
          </div>
        `;
      }

      showForm();
    </script>
  </body>
</html>
