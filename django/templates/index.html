    <style>

        margin: 0;
        font-family: "Segoe UI", "Yu Gothic UI", sans-serif;

      .wrap {

    <main class="wrap">
      <section class="card">

        <p>フロントエンド開発画面は通常 <a href="http://127.0.0.1:5174/">http://127.0.0.1:5174/</a> を利用します。</p>
